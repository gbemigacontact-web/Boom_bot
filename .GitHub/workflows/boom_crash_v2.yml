name: Boom & Crash Bot v2 — SMC Engine

on:
  schedule:
    # 6 runs/jour espacés toutes les 4h
    # Décalés de 5min après les clôtures H4/H1
    # Heure UTC : 00:05 / 04:05 / 08:05 / 12:05 / 16:05 / 20:05
    - cron: "5 0  * * *"
    - cron: "5 4  * * *"
    - cron: "5 8  * * *"
    - cron: "5 12 * * *"
    - cron: "5 16 * * *"
    - cron: "5 20 * * *"

  # Déclenchement manuel pour tests
  workflow_dispatch:

# Permissions pour le commit automatique de l'état FSM
permissions:
  contents: write

jobs:
  scan:
    name: Analyse SMC multi-timeframe
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      # ── 1. Checkout avec token pour permettre le push ──────────────────────
      - name: Checkout du repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # ── 2. Python 3.11 avec cache pip ─────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Dépendances ────────────────────────────────────────────────────
      - name: Installation des dépendances
        run: pip install -r requirements.txt

      # ── 4. Lancement du bot ───────────────────────────────────────────────
      - name: Lancement du bot
        env:
          # Connexion Deriv (lecture seule, pas d'auth requise)
          DERIV_APP_ID: ${{ secrets.DERIV_APP_ID }}

          # Telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

          # Git (pour le commit automatique de l'état FSM)
          GIT_USER_NAME:  "Boom-Crash-Bot-v2"
          GIT_USER_EMAIL: "bot@boom-crash.local"
        working-directory: src
        run: python main.py
