name: Boom & Crash Bot v2 — SMC Engine (IA + Fallback)

on:
  schedule:
    # 3 runs/jour (toutes les 8h) au lieu de 6 (toutes les 4h).
    # Raison : le quota gratuit Gemini pour gemini-3.5-flash est de
    # 20 requêtes/jour. Avec 6 instruments par run, le pire cas (aucun
    # guard ne filtre rien) donne 6 × nb_runs appels IA/jour :
    #   - 6 runs/jour → jusqu'à 36 appels → dépasse systématiquement le quota
    #   - 3 runs/jour → jusqu'à 18 appels → reste sous la limite, avec
    #     une marge de 2 pour des tests manuels (workflow_dispatch)
    - cron: "5 0  * * *"
    - cron: "5 8  * * *"
    - cron: "5 16 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    name: Analyse SMC multi-timeframe (IA + fallback)
    runs-on: ubuntu-latest
    # Relevé de 12 à 20 minutes : un run peut désormais inclure jusqu'à
    # 6 appels Gemini (images + jugement structurel complet), en plus de
    # la récupération de données élargie (500 bougies H4/H1) et de la
    # génération des graphiques. Le fallback Python reste rapide, mais le
    # budget doit couvrir le pire cas (tous les instruments en analyse IA).
    timeout-minutes: 20

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installation des dépendances
        run: pip install -r requirements.txt

      - name: Lancement du bot
        env:
          DERIV_APP_ID:       ${{ secrets.DERIV_APP_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          # Clé API Gemini — à créer dans Settings → Secrets and
          # variables → Actions → New repository secret, nom
          # "GEMINI_API_KEY". Sans ce secret, le bot journalise un
          # avertissement au démarrage et fonctionne en mode fallback
          # Python intégral pour le run (voir main.py::check_environment).
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          # Modèle Gemini — "gemini-3.5-flash" est le modèle gratuit
          # actuel pour les nouveaux comptes (I/O 2026). Si Google
          # retire ce modèle à son tour, vérifie la liste à jour dans
          # Google AI Studio et change uniquement cette valeur.
          GEMINI_MODEL:        "gemini-3.5-flash"
          GIT_USER_NAME:      "Boom-Crash-Bot-v2"
          GIT_USER_EMAIL:     "bot@boom-crash.local"
        working-directory: src
        run: python -m main
